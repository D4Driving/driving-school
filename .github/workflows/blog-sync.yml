name: Blog Sync

on:
  schedule:
    - cron: '0 * * * *' # Runs every hour
  workflow_dispatch:      # Allows manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    
    env:
      # Fixes the Node 20 deprecation warning from your logs
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Initialize and Sync
        run: |
          npm init -y > /dev/null
          npm install rss-parser
          node sync-blog.js
        # The "|" above allows multiple lines without needing extra quotes.
        # This prevents the "unexpected EOF" error you encountered.

      - name: Commit and Push Changes
        run: |
          git config --global user.name "D4Driving Bot"
          git config --global user.email "bot@d4driving.co.uk"
          git add .
          git diff-index --quiet HEAD || git commit -m "Update blog posts from YouTube/RSS"
          git push
