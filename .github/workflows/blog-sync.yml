name: Soro Blog Sync
on:
  schedule:
    - cron: '0 * * * *' 
  workflow_dispatch: 

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Sync Soro Articles
        env:
          RSS_URL: "https://app.trysoro.com/api/rss/a164f988-26e5-4b2c-908a-57e06e27c032"
        run: |
          npm init -y > /dev/null
          npm install rss-parser jsdom > /dev/null
          node -e "
          const Parser = require('rss-parser');
          const fs = require('fs');
          const { JSDOM } = require('jsdom');
          const parser = new Parser({
            customFields: {
              item: [['content:encoded', 'contentEncoded']],
            },
            headers: {'User-Agent': 'D4Driving-Bot/3.0'},
          });

          (async () => {
            try {
              console.log('Fetching feed...');
              const feed = await parser.parseURL(process.env.RSS_URL);
              const templateHtml = fs.readFileSync('post-template.html', 'utf8');
              let blogIndexHtml = fs.readFileSync('blog.html', 'utf8');

              for (const item of feed.items) {
                const slug = item.title.toLowerCase().replace(/[^\w ]+/g, '').replace(/ +/g, '-');
                const fileName = slug + '.html';
                
                console.log('Processing: ' + item.title);
                
                const dom = new JSDOM(templateHtml);
                const document = dom.window.document;

                // 1. Title & Meta
                if (document.getElementById('post-title')) document.getElementById('post-title').innerHTML = item.title;
                if (document.getElementById('meta-title')) document.getElementById('meta-title').innerHTML = item.title + ' | D4Driving Blog';

                // 2. Date
                if (document.getElementById('post-date')) {
                  document.getElementById('post-date').innerHTML = new Date(item.pubDate).toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
                }

                // 3. SMART CONTENT INJECTION (The Fix)
                const fullContent = item.contentEncoded || item.content || item.description || 'Content currently unavailable.';
                if (document.getElementById('post-content')) {
                  document.getElementById('post-content').innerHTML = fullContent;
                }

                // Save/Overwrite the file
                fs.writeFileSync(fileName, dom.serialize());

                // 4. Update Blog Index if link missing
                if (!blogIndexHtml.includes(fileName)) {
                  const newCard = \`
          <article class='glass-card p-6 rounded-3xl hover:border-white/20 transition group'>
              <h3 class='text-lg font-bold mt-1 group-hover:text-blue-400'>\${item.title}</h3>
              <p class='text-slate-400 text-sm mt-2 line-clamp-2'>\${item.contentSnippet || ''}</p>
              <a href='\${fileName}' class='text-blue-400 text-xs font-bold mt-4 inline-block hover:underline'>Read Full Article →</a>
          </article>
          \`;
                  blogIndexHtml = blogIndexHtml.replace('', '' + newCard);
                }
              }
              fs.writeFileSync('blog.html', blogIndexHtml);
              console.log('Sync complete.');
            } catch (err) {
              console.error('Error:', err.message);
            }
          })();
          "

      - name: Commit and Push
        run: |
          git config --global user.name "D4Driving-Bot"
          git config --global user.email "bot@d4driving.co.uk"
          git add .
          git commit -m "Full Content Sync - March 2026" || echo "No changes"
          git push
