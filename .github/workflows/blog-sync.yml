name: Soro Blog Sync
on:
  schedule:
    - cron: '0 * * * *' 
  workflow_dispatch: 

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

     # ... (Keep the top part of your .yml the same) ...

      - name: Sync Soro Articles
        env:
          RSS_URL: "https://app.trysoro.com/api/rss/a164f988-26e5-4b2c-908a-57e06e27c032"
        run: |
          npm init -y > /dev/null
          npm install rss-parser jsdom > /dev/null
          node -e "
          const Parser = require('rss-parser');
          const fs = require('fs');
          const { JSDOM } = require('jsdom');
          const parser = new Parser();

          (async () => {
            try {
              const feed = await parser.parseURL(process.env.RSS_URL);
              const templateHtml = fs.readFileSync('post-template.html', 'utf8');
              let blogIndexHtml = fs.readFileSync('blog.html', 'utf8');

              for (const item of feed.items) {
                const slug = item.title.toLowerCase().replace(/[^\w ]+/g, '').replace(/ +/g, '-');
                const fileName = slug + '.html';
                
                // Even if file exists, we'll recreate it to fix the blank template issue
                console.log('Processing: ' + item.title);
                
                const dom = new JSDOM(templateHtml);
                const document = dom.window.document;

                // 1. Inject Title
                const titleEl = document.getElementById('post-title');
                if (titleEl) titleEl.innerHTML = item.title;

                // 2. Inject Date
                const dateEl = document.getElementById('post-date');
                if (dateEl) dateEl.innerHTML = new Date(item.pubDate).toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });

                // 3. Inject Content
                const contentEl = document.getElementById('post-content');
                if (contentEl) contentEl.innerHTML = item.content;

                // 4. Update Meta Title for SEO
                const headTitle = document.querySelector('title');
                if (headTitle) headTitle.innerHTML = item.title + ' | D4Driving Peterborough';

                fs.writeFileSync(fileName, dom.serialize());

                // Update blog index if not already linked
                if (!blogIndexHtml.includes(fileName)) {
                  const newCard = \`
                  <article class='glass-card p-6 rounded-3xl hover:border-white/20 transition group'>
                      <h3 class='text-lg font-bold mt-1 group-hover:text-blue-400'>\${item.title}</h3>
                      <a href='\${fileName}' class='text-blue-400 text-xs font-bold mt-4 inline-block'>Read Full Article →</a>
                  </article>\`;
                  blogIndexHtml = blogIndexHtml.replace('', '' + newCard);
                }
              }
              fs.writeFileSync('blog.html', blogIndexHtml);
            } catch (err) {
              console.error('Error:', err.message);
            }
          })();
          "

# ... (Keep the Commit/Push part the same) ...

      - name: Commit and Push
        run: |
          git config --global user.name "D4Driving-Bot"
          git config --global user.email "bot@d4driving.co.uk"
          git add .
          git commit -m "Automated Blog Update" || echo "Nothing to commit"
          git push
