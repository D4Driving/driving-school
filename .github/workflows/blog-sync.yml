name: Soro Blog Sync
on:
  schedule:
    - cron: '0 * * * *' # Checks for new posts every hour
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      - name: Install Dependencies
        run: npm install rss-parser fs path

      - name: Sync Soro Articles
        env:
          RSS_URL: "https://app.trysoro.com/api/rss/a164f988-26e5-4b2c-908a-57e06e27c032"
        run: |
          node -e "
          const Parser = require('rss-parser');
          const fs = require('fs');
          const path = require('path');
          const parser = new Parser();

          (async () => {
            const feed = await parser.parseURL(process.env.RSS_URL);
            let blogIndexHtml = fs.readFileSync('blog.html', 'utf8');
            const template = fs.readFileSync('post-template.html', 'utf8');

            feed.items.forEach(item => {
              const slug = item.title.toLowerCase().replace(/[^\w ]+/g, '').replace(/ +/g, '-');
              const fileName = slug + '.html';
              
              if (!fs.existsSync(fileName)) {
                // 1. Create Individual Post Page
                let postHtml = template
                  .replace('Post Title Placeholder', item.title)
                  .replace('Category Name', 'Driving Tips')
                  .replace('March 2026', new Date(item.pubDate).toLocaleDateString('en-GB', { month: 'long', year: 'numeric' }))
                  .replace('Main article text goes here...', item.content);
                
                fs.writeFileSync(fileName, postHtml);

                // 2. Add Card to blog.html (Insert after the opening grid tag)
                const newCard = \`
                <article class='glass-card p-6 rounded-3xl hover:border-white/20 transition group'>
                    <span class='text-slate-500 text-[10px] font-bold uppercase tracking-widest'>Latest</span>
                    <h3 class='text-lg font-bold mt-1 group-hover:text-blue-400 transition'>\${item.title}</h3>
                    <p class='text-slate-400 text-sm mt-2 line-clamp-2'>\${item.contentSnippet || ''}</p>
                    <a href='\${fileName}' class='text-blue-400 text-xs font-bold mt-4 inline-block hover:underline'>Read More →</a>
                </article>\`;
                
                blogIndexHtml = blogIndexHtml.replace('', '' + newCard);
              }
            });
            
            fs.writeFileSync('blog.html', blogIndexHtml);
          })();
          "

      - name: Commit and Push Changes
        run: |
          git config --global user.name "D4Driving-Bot"
          git config --global user.email "bot@d4driving.co.uk"
          git add .
          git commit -m "New blog posts from Soro" || exit 0
          git push
