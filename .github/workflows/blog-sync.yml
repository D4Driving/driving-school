- name: Sync Articles
        env:
          RSS_URL: "https://app.trysoro.com/api/rss/a164f988-26e5-4b2c-908a-57e06e27c032"
        run: |
          npm init -y
          npm install rss-parser jsdom
          node << 'EOF'
          const Parser = require('rss-parser');
          const fs = require('fs');
          const parser = new Parser();

          (async () => {
            try {
              const feed = await parser.parseURL(process.env.RSS_URL);
              let allCards = '';
              for (const item of feed.items) {
                const slug = item.title.toLowerCase().replace(/[^\w ]+/g, '').replace(/ +/g, '-');
                allCards += `
                <article class="glass-card p-6 rounded-3xl hover:border-white/20 transition group">
                  <h3 class="text-lg font-bold mt-1 group-hover:text-blue-400">${item.title}</h3>
                  <p class="text-slate-400 text-sm mt-2 line-clamp-2">${item.contentSnippet || ""}</p>
                  <a href="${slug}.html" class="text-blue-400 text-xs font-bold mt-4 inline-block hover:underline">Read Full Article →</a>
                </article>`;
              }

              let blogHtml = fs.readFileSync('blog.html', 'utf8');
              
              // This is the "Safety Catch"
              const startMarker = '';
              const endMarker = '';

              if (blogHtml.includes(startMarker) && blogHtml.includes(endMarker)) {
                const parts = blogHtml.split(startMarker);
                const head = parts[0];
                const tail = parts[1].split(endMarker)[1];
                const finalHtml = head + startMarker + "\n" + allCards + "\n" + endMarker + tail;
                fs.writeFileSync('blog.html', finalHtml);
                console.log("Successfully injected articles into markers.");
              } else {
                console.log("MARKERS NOT FOUND! Check blog.html for and ");
                process.exit(1); // Stop the script if it's going to break the site
              }
            } catch (err) {
              console.error(err);
              process.exit(1);
            }
          })();
          EOF
