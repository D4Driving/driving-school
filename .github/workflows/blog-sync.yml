name: Soro Blog Sync
on:
  schedule:
    - cron: '0 * * * *' # Runs every hour
  workflow_dispatch: # Allows manual triggering

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Sync Soro Articles
        env:
          RSS_URL: "https://app.trysoro.com/api/rss/a164f988-26e5-4b2c-908a-57e06e27c032"
        run: |
          npm init -y > /dev/null
          npm install rss-parser jsdom > /dev/null
          node -e "
          const Parser = require('rss-parser');
          const fs = require('fs');
          const { JSDOM } = require('jsdom');
          
          const parser = new Parser({
            customFields: {
              item: [['content:encoded', 'fullContent']],
            },
            headers: {'User-Agent': 'D4Driving-Bot/4.0'},
          });

          (async () => {
            try {
              console.log('Fetching feed...');
              const feed = await parser.parseURL(process.env.RSS_URL);
              
              // 1. Sort items so newest is first
              const items = feed.items.sort((a, b) => new Date(b.pubDate) - new Date(a.pubDate));
              
              const templateHtml = fs.readFileSync('post-template.html', 'utf8');
              let blogIndexHtml = fs.readFileSync('blog.html', 'utf8');

              for (const item of items) {
                const slug = item.title.toLowerCase().replace(/[^\w ]+/g, '').replace(/ +/g, '-');
                const fileName = slug + '.html';
                
                // --- Generate Individual Article Page ---
                const dom = new JSDOM(templateHtml);
                const document = dom.window.document;
                
                if (document.getElementById('post-title')) document.getElementById('post-title').innerHTML = item.title;
                if (document.getElementById('meta-title')) document.getElementById('meta-title').innerHTML = item.title + ' | D4Driving Blog';
                
                const formattedDate = new Date(item.pubDate).toLocaleDateString('en-GB', { 
                  day: 'numeric', month: 'long', year: 'numeric' 
                });
                if (document.getElementById('post-date')) document.getElementById('post-date').innerHTML = formattedDate;

                // Use fullContent from Soro as Matt suggested
                const articleBody = item.fullContent || item.content || item.description || 'Content unavailable.';
                if (document.getElementById('post-content')) document.getElementById('post-content').innerHTML = articleBody;

                fs.writeFileSync(fileName, dom.serialize());

                // --- Update Blog Index (Newest at Top) ---
                if (!blogIndexHtml.includes(fileName)) {
                  console.log('Adding new post to index: ' + item.title);
                  const newCard = \`
          <article class='glass-card p-6 rounded-3xl hover:border-white/20 transition group'>
              <h3 class='text-lg font-bold mt-1 group-hover:text-blue-400'>\${item.title}</h3>
              <p class='text-slate-400 text-sm mt-2 line-clamp-2'>\${item.contentSnippet || ''}</p>
              <a href='\${fileName}' class='text-blue-400 text-xs font-bold mt-4 inline-block hover:underline'>Read Full Article →</a>
          </article>
          \`;
                  
                  // This line inserts the new card immediately after the 'Post Grid' comment
                  // ensuring newest posts are always at the top of the list.
                  blogIndexHtml = blogIndexHtml.replace('', '' + newCard);
                }
              }
              
              fs.writeFileSync('blog.html', blogIndexHtml);
              console.log('Sync Successful.');
            } catch (err) {
              console.error('Error:', err.message);
              process.exit(1);
            }
          })();
          "

      - name: Commit and Push
        run: |
          git config --global user.name "D4Driving-Bot"
          git config --global user.email "bot@d4driving.co.uk"
          git add .
          git commit -m "Automated Blog Sync: Newest posts at top" || echo "No changes to commit"
          git push
