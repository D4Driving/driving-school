name: Soro Blog Sync
on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Update Blog and Generate Articles
        env:
          RSS_URL: "https://app.trysoro.com/api/rss/a164f988-26e5-4b2c-908a-57e06e27c032"
        run: |
          npm init -y
          npm install rss-parser
          node << 'EOF'
          const Parser = require('rss-parser');
          const fs = require('fs');
          const parser = new Parser();

          (async () => {
            const feed = await parser.parseURL(process.env.RSS_URL);
            const blogTemplate = fs.readFileSync('blog-template.html', 'utf8');
            const articleTemplate = fs.readFileSync('article-template.html', 'utf8');
            
            let gridCards = '';

            for (const item of feed.items) {
              const slug = item.title.toLowerCase().replace(/[^\w ]+/g, '').replace(/ +/g, '-');
              const imageUrl = item.enclosure ? item.enclosure.url : 'default-blog-image.jpg';
              const content = item['content:encoded'] || item.content || item.description || "";

              // 1. Build the Grid Card for blog.html
              gridCards += `
              <article class="glass-card overflow-hidden rounded-3xl hover:border-white/20 transition group">
                <div class="h-48 overflow-hidden">
                  <img src="${imageUrl}" class="w-full h-full object-cover group-hover:scale-105 transition duration-500">
                </div>
                <div class="p-6">
                  <h3 class="text-lg font-bold group-hover:text-blue-400">${item.title}</h3>
                  <p class="text-slate-400 text-sm mt-2 line-clamp-2">${item.contentSnippet || ""}</p>
                  <a href="${slug}.html" class="text-blue-400 text-xs font-bold mt-4 inline-block hover:underline">Read Full Article →</a>
                </div>
              </article>`;

              // 2. Build the Individual Article Page
              let pageHtml = articleTemplate
                .replace(/ARTICLE_TITLE/g, item.title)
                .replace('ARTICLE_IMAGE', imageUrl)
                .replace('ARTICLE_CONTENT', content);
              
              fs.writeFileSync(`${slug}.html`, pageHtml);
            }

            // 3. Update the main Blog page
            const finalBlogHtml = blogTemplate.replace('GRID_GOES_HERE', gridCards);
            fs.writeFileSync('blog.html', finalBlogHtml);
            
            console.log('Successfully updated blog and generated all article pages!');
          })();
          EOF

      - name: Save Changes
        run: |
          git config --global user.name "D4Driving-Bot"
          git config --global user.email "bot@d4driving.co.uk"
          git add .
          git commit -m "Generate articles with images" || echo "No changes"
          git push
