name: Soro Blog Sync
on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Update Blog
        env:
          RSS_URL: "https://app.trysoro.com/api/rss/a164f988-26e5-4b2c-908a-57e06e27c032"
        run: |
          npm init -y
          npm install rss-parser
          node << 'EOF'
          const Parser = require('rss-parser');
          const fs = require('fs');
          const parser = new Parser();

          (async () => {
            try {
              const feed = await parser.parseURL(process.env.RSS_URL);
              let cards = '';
              for (const item of feed.items) {
                const slug = item.title.toLowerCase().replace(/[^\w ]+/g, '').replace(/ +/g, '-');
                cards += `
                <article class="glass-card p-6 rounded-3xl hover:border-white/20 transition group">
                  <h3 class="text-lg font-bold mt-1 group-hover:text-blue-400">${item.title}</h3>
                  <p class="text-slate-400 text-sm mt-2 line-clamp-2">${item.contentSnippet || ""}</p>
                  <a href="${slug}.html" class="text-blue-400 text-xs font-bold mt-4 inline-block hover:underline">Read Full Article →</a>
                </article>`;
              }

              // 1. Read the Master Template
              const template = fs.readFileSync('blog-template.html', 'utf8');
              const marker = 'GRID_GOES_HERE';

              // 2. Check if the marker exists
              if (!template.includes(marker)) {
                console.error('CRITICAL ERROR: Could not find GRID_GOES_HERE inside blog-template.html');
                process.exit(1);
              }

              // 3. Swap the word for the articles
              const finalHtml = template.replace(marker, cards);
              
              // 4. Save the result to the real blog.html
              fs.writeFileSync('blog.html', finalHtml);
              
              console.log('--- DEBUG: Start of generated blog.html ---');
              console.log(finalHtml.substring(0, 300));
              console.log('--- DEBUG END ---');
              
            } catch (err) {
              console.error('Error during sync:', err);
              process.exit(1);
            }
          })();
          EOF

      - name: Save Changes
        run: |
          git config --global user.name "D4Driving-Bot"
          git config --global user.email "bot@d4driving.co.uk"
          git add .
          git commit -m "Force Update Blog Layout" || echo "No changes to commit"
          git push
