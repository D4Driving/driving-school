<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driving Tips | D4Driving Peterborough</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: white; }
        .glass-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="min-h-screen pb-20">
    <nav class="max-w-6xl mx-auto p-6 flex justify-between items-center">
        <a href="index.html" class="flex items-center gap-3">
            <img src="400dpiLogoCropped.png" alt="Logo" class="h-10 w-auto">
            <span class="font-bold uppercase tracking-wider">D4DRIVING</span>
        </a>
        <a href="index.html" class="text-xs font-bold bg-slate-800 px-4 py-2 rounded-full border border-white/10 hover:bg-slate-700 transition">← Back Home</a>
    </nav>
    <header class="max-w-4xl mx-auto px-6 pt-12 pb-16 text-center">
        <h1 class="text-4xl md:text-5xl font-extrabold mb-4">The D4Driving Journal</h1>
        <p class="text-slate-400 text-lg">Latest driving insights for Peterborough learners.</p>
    </header>
    <main class="max-w-6xl mx-auto px-6">
        <div id="blog-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            GRID_GOES_HERE
        </div>
        <div class="flex justify-center my-8">
    <button id="shareBtn" class="flex items-center gap-2 px-6 py-3 bg-blue-600/10 border border-blue-500/30 text-blue-400 rounded-full font-bold uppercase tracking-widest text-xs hover:bg-blue-600 hover:text-white transition-all">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
            <path d="M13.5 1a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3zM11 2.5a2.5 2.5 0 1 1 .603 1.628l-6.718 3.12a2.499 2.499 0 0 1 0 1.504l6.718 3.12a2.5 2.5 0 1 1-.488.876l-6.718-3.12a2.5 2.5 0 1 1 0-3.256l6.718-3.12A2.5 2.5 0 0 1 11 2.5zm-8.5 4a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3zm11 5.5a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3z"/>
        </svg>
        Share Article
    </button>
</div>
    </main>
    <footer class="max-w-4xl mx-auto mt-20 p-8 text-center border-t border-white/5 text-slate-600 text-sm">
        © 2026 D4Driving School of Motoring.
    </footer>

    <script>
document.getElementById('shareBtn').addEventListener('click', async () => {
    const shareData = {
        title: document.title,
        text: 'Check out this driving tip from D4Driving Peterborough!',
        url: window.location.href
    };

    try {
        if (navigator.share) {
            // This opens the native phone share menu (WhatsApp, SMS, Socials)
            await navigator.share(shareData);
        } else {
            // Fallback: Copy to clipboard if native share isn't supported
            await navigator.clipboard.writeText(window.location.href);
            alert('Link copied to clipboard!');
        }
    } catch (err) {
        console.log('Share cancelled or failed');
    }
});
</script>
</body>
</html>
