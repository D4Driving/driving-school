<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D4Driving School of Motoring</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: white; }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.5rem;
            min-height: 600px;
        }
    </style>
</head>
<body class="flex flex-col items-center p-6">

    <header class="text-center mb-8">
        <h1 class="text-3xl font-bold mb-2">D4Driving School of Motoring</h1>
        <p class="text-slate-400">Book your driving lesson below</p>
    </header>

    <main class="w-full max-w-4xl">
        <div class="glass-card shadow-2xl overflow-hidden">
            <div id="my-cal-inline" style="width:100%;height:100%;min-height:600px;"></div>
        </div>
    </main>

    <script type="text/javascript">
    (function (C, A, L) {
        let p = function (a, ar) { a.q.push(ar); };
        let d = C.document; C.Cal = C.Cal || function () {
            let cal = C.Cal; let ar = arguments;
            if (!cal.loaded) { cal.q = cal.q || []; p(cal, ar); return; }
            p(cal, ar);
        };
        let js = d.createElement("script"); js.async = !0;
        js.src = "https://app.cal.com/embed/embed.js";
        let s = d.getElementsByTagName("script")[0]; s.parentNode.insertBefore(js, s);
        C.Cal("init", {origin:"https://app.cal.com"});
    })(window, "Cal");

    // The Fail-Safe: Wait 500ms before trying to render
    setTimeout(function() {
        Cal("inline", {
            elementOrSelector: "#my-cal-inline",
            calLink: "peer/30min", 
            config: {"layout":"month_view", "theme":"dark"}
        });
        Cal("ui", {"theme":"dark"});
    }, 500);
    </script>

</body>
</html>
