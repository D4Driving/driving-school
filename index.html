<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D4Driving School of Motoring | Book a Lesson</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="text-slate-200 min-h-screen flex flex-col items-center">

    <header class="w-full max-w-2xl p-6 text-center mt-8">
        <div class="inline-block p-3 rounded-2xl bg-blue-600 mb-4 shadow-lg shadow-blue-500/20">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 20l-5.447-2.724A2 2 0 013 15.382V6c0-1.1.9-2 2-2h14a2 2 0 012 2v9.382a2 2 0 01-1.553 1.894L15 20m-6 0v-3a3 3 0 013-3h0a3 3 0 013 3v3m-6 0h6" />
            </svg>
        </div>
        <h1 class="text-3xl font-800 tracking-tight text-white mb-2">D4Driving School of Motoring</h1>
        <p class="text-slate-400">Professional lessons. Your schedule, your terms.</p>
    </header>

    <main class="w-full max-w-4xl px-4 pb-12">
        <div class="glass-card rounded-3xl overflow-hidden shadow-2xl">
            <div id="my-cal-inline" style="width:100%;height:600px;overflow:scroll;"></div>
            <script type="text/javascript">
            (function (C, A, L) {
                let p = function (a, ar) { a.q.push(ar); };
                let d = C.document; C.Cal = C.Cal || function () {
                    let cal = C.Cal; let ar = arguments;
                    if (!cal.loaded) { cal.q = cal.q || []; p(cal, ar); return; }
                    p(cal, ar);
                };
                let js = d.createElement("script"); js.async = !0;
                js.src = "https://app.cal.com/embed/embed.js";
                let s = d.getElementsByTagName("script")[0]; s.parentNode.insertBefore(js, s);
                C.Cal("init", {origin:"https://app.cal.com"});

                // REPLACE 'YOUR_CAL_LINK' WITH YOUR ACTUAL CAL.COM SLUG
                C.Cal("inline", {
                    elementOrSelector: "#my-cal-inline",
                    calLink: "cal.com/d4driving", 
                    layout: "month_view",
                    theme: "dark"
                });

                C.Cal("ui", {"styles":{"branding":{"brandColor":"#2563eb"}},"hideEventTypeDetails":false,"layout":"month_view"});
            })(window, "Cal");
            </script>
            </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mt-8">
            <div class="glass-card p-5 rounded-2xl text-center">
                <p class="text-blue-400 font-semibold mb-1">Instant Sync</p>
                <p class="text-xs text-slate-500">Bookings appear in my calendar instantly.</p>
            </div>
            <div class="glass-card p-5 rounded-2xl text-center">
                <p class="text-blue-400 font-semibold mb-1">SMS Reminders</p>
                <p class="text-xs text-slate-500">Never miss a lesson with auto-alerts.</p>
            </div>
            <div class="glass-card p-5 rounded-2xl text-center">
                <p class="text-blue-400 font-semibold mb-1">Flexible</p>
                <p class="text-xs text-slate-500">Reschedule via the app up to 24h before.</p>
            </div>
        </div>
    </main>

</body>
</html>
