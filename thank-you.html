<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message Sent | D4Driving</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: white; }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center px-6 text-center">

    <div class="glass-card p-12 rounded-[2.5rem] max-w-lg w-full shadow-2xl border-blue-500/20">
        <div class="inline-block p-4 bg-green-500/10 rounded-full mb-6">
            <svg class="w-12 h-12 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
            </svg>
        </div>
        
        <h1 class="text-3xl font-extrabold text-white mb-4">Message Received!</h1>
        <p class="text-slate-400 mb-8 text-lg">Thanks for reaching out, Robert. I'll check my schedule and get back to you within 24 hours.</p>
        
        <div class="space-y-4">
            <p class="text-xs text-blue-400 font-bold uppercase tracking-widest">While you wait:</p>
            <a href="https://www.youtube.com/@d4drivingSOM" target="_blank" class="block w-full py-4 bg-red-600/10 hover:bg-red-600/20 text-red-500 rounded-2xl font-bold transition border border-red-600/30">
                Watch Driving Tips on YouTube
            </a>
            <a href="index.html" class="block w-full py-4 bg-blue-600 hover:bg-blue-500 text-white rounded-2xl font-bold transition shadow-lg shadow-blue-600/20">
                Back to Home
            </a>
        </div>
    </div>

</body>
</html>
